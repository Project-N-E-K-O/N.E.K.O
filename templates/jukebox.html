<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>N.E.K.O. Jukebox</title>

    <script src="/static/i18n-i18next.js"></script>
    <link rel="stylesheet" href="/static/libs/APlayer.min.css">
    <script src="/static/libs/APlayer.min.js"></script>
    <link rel="stylesheet" href="/static/css/dark-mode.css">
    <script src="/static/theme-manager.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #87CEEB;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        .jukebox-wrapper {
            position: fixed !important;
            inset: 0 !important;
            bottom: 0 !important;
            right: 0 !important;
            z-index: 1 !important;
        }

        .jukebox-container {
            width: 100% !important;
            max-height: 100% !important;
            height: 100% !important;
            border-radius: 0 !important;
            box-sizing: border-box !important;
            -webkit-app-region: no-drag !important;
        }

        .jukebox-header,
        .jukebox-header-left,
        .jukebox-header h3,
        .jukebox-header-buttons,
        .jukebox-header-buttons button,
        .jukebox-settings,
        .jukebox-minimize,
        .jukebox-close,
        .jukebox-content,
        .jukebox-controls-row,
        .jukebox-calibration-section,
        .jukebox-notice,
        .sam-panel {
            -webkit-app-region: no-drag !important;
        }

        body.neko-jukebox-standalone-page .jukebox-drag-overlay {
            display: none !important;
        }

        body.neko-jukebox-standalone-page .jukebox-header {
            cursor: grab;
            touch-action: none;
        }

        body.neko-jukebox-standalone-page.jukebox-dragging .jukebox-header {
            cursor: grabbing;
        }

        body.neko-jukebox-standalone-page .jukebox-resize-handle {
            touch-action: none;
        }
    </style>
</head>
<body>
    <script>
        window.__NEKO_JUKEBOX_STANDALONE__ = true;
    </script>
    <script src="/static/Jukebox.js"></script>
    <script src="/static/jukebox-standalone.js"></script>
    <script>
        async function _fetchModelType() {
            try {
                var res = await fetch('/api/config/page_config');
                if (res.ok) {
                    var cfg = await res.json();
                    window.lanlan_config = window.lanlan_config || {};
                    window.lanlan_config.model_type = cfg.model_type || 'live2d';
                    window.lanlan_config.live3d_sub_type = cfg.live3d_sub_type || '';
                    window.lanlan_config.catgirl_name = cfg.lanlan_name || '';
                }
            } catch (_) {}
        }

        async function _initJukebox() {
            if (!window.Jukebox) return;

            await _fetchModelType();

            window.Jukebox_playSong = window.Jukebox.playSong;
            window.Jukebox_close = function() {
                if (window.close) window.close();
            };
            window.Jukebox_hide = function() {
                if (window.close) window.close();
            };
            window.Jukebox_updateVolume = window.Jukebox.updateVolume;
            window.Jukebox_logVolumeChange = window.Jukebox.logVolumeChange;
            window.Jukebox_togglePause = window.Jukebox.togglePause;

            window.Jukebox.open();

            if (window.NekoJukeboxStandalonePage) {
                window.NekoJukeboxStandalonePage.mount();
            }
        }

        var _jbInitDone = false;
        function _tryInitJukebox() {
            if (_jbInitDone) return;
            if (typeof window.t === 'function' && window.i18n && window.i18n.isInitialized !== false) {
                _jbInitDone = true;
                _initJukebox();
            }
        }

        var _jbPoll = setInterval(function() {
            _tryInitJukebox();
        }, 100);

        setTimeout(function() {
            clearInterval(_jbPoll);
            if (_jbInitDone) return;

            _jbInitDone = true;
            if (typeof window.t !== 'function') {
                window.t = function(key, fallback) {
                    return fallback || key;
                };
            }
            _initJukebox();
        }, 3000);
    </script>
</body>
</html>
