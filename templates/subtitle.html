<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.E.K.O. Subtitle</title>
    <style>
        /* 与 index.css body 一致 */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* 与 index.css #subtitle-display 完全一致 */
        #subtitle-display {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            min-height: 80px;
            transition: min-height 0.3s ease, font-size 0.3s ease;
            padding: 10px 18px;
            background: linear-gradient(135deg, rgba(68, 183, 254, 0.95) 0%, rgba(68, 183, 254, 0.9) 50%, rgba(100, 200, 255, 0.95) 100%);
            color: #fff;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            line-height: 1.5;
            text-align: center;
            overflow-wrap: break-word;
            white-space: normal;
            box-shadow: 0 6px 24px rgba(68, 183, 254, 0.35),
                0 0 0 1px rgba(255, 255, 255, 0.3) inset;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            box-sizing: border-box;
            padding-top: 28px;
        }
        #subtitle-scroll {
            overflow-y: auto;
            scrollbar-width: none;
            width: 100%;
            max-height: 100%;
            padding: 4px 0 28px 0;
        }
        #subtitle-scroll::-webkit-scrollbar {
            display: none;
        }

        /* 与 index.css #subtitle-text 一致 */
        #subtitle-text {
            display: block;
            margin-right: 24px;
            padding: 4px 0 28px 0;
            white-space: pre-wrap;
            overflow-wrap: break-word;
        }

        /* 设置按钮（右上角齿轮） */
        #subtitle-settings-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s ease;
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.12);
            opacity: 0;
            border: none;
            padding: 0;
            font-size: inherit;
        }
        #subtitle-settings-btn svg {
            width: 13px;
            height: 13px;
            transition: transform 0.3s ease;
        }
        #subtitle-display:hover #subtitle-settings-btn {
            opacity: 1;
        }
        #subtitle-settings-btn:hover {
            background: rgba(255, 255, 255, 0.32);
        }
        #subtitle-settings-btn:hover svg {
            transform: rotate(60deg);
        }

        /* 设置面板 */
        #subtitle-settings-panel {
            position: absolute;
            top: 30px;
            right: 4px;
            min-width: 210px;
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
            z-index: 10;
        }
        #subtitle-settings-panel.hidden {
            display: none;
        }
        .subtitle-settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 4px 0;
            color: #fff;
            font-size: 13px;
            white-space: nowrap;
        }
        #subtitle-lang-select {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 5px;
            padding: 2px 4px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }
        #subtitle-lang-select option {
            background: #333;
            color: #fff;
        }
        #subtitle-opacity-slider {
            width: 70px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        #subtitle-opacity-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }
        #subtitle-opacity-value {
            font-size: 11px;
            min-width: 30px;
            text-align: right;
        }
        .subtitle-settings-switch {
            position: relative;
            width: 36px;
            height: 20px;
            cursor: pointer;
            display: inline-block;
        }
        .subtitle-settings-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }
        .subtitle-settings-track {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            transition: 0.25s;
        }
        .subtitle-settings-track::before {
            content: '';
            position: absolute;
            left: 2px;
            top: 2px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: 0.25s;
        }
        .subtitle-settings-switch input:checked + .subtitle-settings-track {
            background: rgba(100, 220, 130, 0.7);
        }
        .subtitle-settings-switch input:checked + .subtitle-settings-track::before {
            transform: translateX(16px);
        }
        #subtitle-display.drag-anywhere {
            cursor: grab;
            pointer-events: auto;
        }
        #subtitle-display.drag-anywhere.dragging {
            cursor: grabbing;
        }
        .subtitle-size-group {
            display: flex;
            gap: 4px;
        }
        .subtitle-size-btn {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .subtitle-size-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .subtitle-size-btn.active {
            background: rgba(255, 255, 255, 0.45);
            border-color: rgba(255, 255, 255, 0.6);
        }

        /* 与 index.css #subtitle-drag-handle 一致 */
        #subtitle-drag-handle {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            border-radius: 6px;
            transition: all 0.2s ease;
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(4px);
        }
        #subtitle-drag-handle:hover {
            background: rgba(255, 255, 255, 0.32);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.6);
        }
        #subtitle-drag-handle:active {
            cursor: grabbing;
            background: rgba(255, 255, 255, 0.42);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.9);
        }
        #subtitle-drag-arrows {
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #subtitle-drag-arrows svg {
            width: 14px; height: 14px;
        }

        /* 与 dark-mode.css [data-theme="dark"] #subtitle-display 一致 */
        [data-theme="dark"] #subtitle-display {
            background: linear-gradient(135deg, rgba(42, 123, 196, 0.92) 0%, rgba(42, 123, 196, 0.88) 50%, rgba(60, 145, 220, 0.92) 100%);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px rgba(42, 123, 196, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset;
        }
    </style>
</head>
<body>
    <!-- 与 index.html 中 #subtitle-display 结构完全一致 -->
    <div id="subtitle-display">
        <div id="subtitle-scroll">
            <span id="subtitle-text"></span>
        </div>
        <button type="button" id="subtitle-settings-btn" title="Subtitle Settings" aria-label="Subtitle Settings">
            <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
                <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.61 3.61 0 0112 15.6z"/>
            </svg>
        </button>
        <div id="subtitle-settings-panel" class="hidden">
            <div class="subtitle-settings-row">
                <span class="subtitle-settings-label">目标语言</span>
                <select id="subtitle-lang-select" title="目标语言">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="ru">Русский</option>
                </select>
            </div>
            <div class="subtitle-settings-row">
                <span class="subtitle-settings-label">不透明度</span>
                <input type="range" id="subtitle-opacity-slider" min="20" max="100" value="95" title="不透明度">
                <span id="subtitle-opacity-value">95%</span>
            </div>
            <div class="subtitle-settings-row">
                <span class="subtitle-settings-label">整体拖动</span>
                <label class="subtitle-settings-switch">
                    <input type="checkbox" id="subtitle-drag-mode-toggle" aria-label="整体拖动开关">
                    <span class="subtitle-settings-track"></span>
                </label>
            </div>
            <div class="subtitle-settings-row">
                <span class="subtitle-settings-label">大小</span>
                <div class="subtitle-size-group">
                    <button type="button" class="subtitle-size-btn" data-size="small">小</button>
                    <button type="button" class="subtitle-size-btn active" data-size="medium">中</button>
                    <button type="button" class="subtitle-size-btn" data-size="large">大</button>
                </div>
            </div>
        </div>
        <div id="subtitle-drag-handle">
            <div id="subtitle-drag-arrows">
                <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3L8.5 8H10.5V10.5H13.5V8H15.5L12 3Z"/>
                    <path d="M12 21L15.5 16H13.5V13.5H10.5V16H8.5L12 21Z"/>
                    <path d="M3 12L8 8.5V10.5H10.5V13.5H8V15.5L3 12Z"/>
                    <path d="M21 12L16 15.5V13.5H13.5V10.5H16V8.5L21 12Z"/>
                    <circle cx="12" cy="12" r="1.2"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        // ===== 内嵌 i18n（subtitle.html 是独立窗口，不加载 i18next）=====
        var SUBTITLE_I18N = {
            zh: { settingsBtn: '字幕设置', targetLang: '目标语言', opacity: '不透明度', dragAnywhere: '整体拖动', dragAria: '整体拖动开关', size: '大小', sizeSmall: '小', sizeMedium: '中', sizeLarge: '大' },
            en: { settingsBtn: 'Subtitle Settings', targetLang: 'Target Language', opacity: 'Opacity', dragAnywhere: 'Drag Anywhere', dragAria: 'Drag Anywhere toggle', size: 'Size', sizeSmall: 'S', sizeMedium: 'M', sizeLarge: 'L' },
            ja: { settingsBtn: '字幕設定', targetLang: '翻訳先の言語', opacity: '不透明度', dragAnywhere: '全体ドラッグ', dragAria: '全体ドラッグの切り替え', size: 'サイズ', sizeSmall: '小', sizeMedium: '中', sizeLarge: '大' },
            ko: { settingsBtn: '자막 설정', targetLang: '대상 언어', opacity: '불투명도', dragAnywhere: '전체 드래그', dragAria: '전체 드래그 전환', size: '크기', sizeSmall: '소', sizeMedium: '중', sizeLarge: '대' },
            ru: { settingsBtn: 'Настройки субтитров', targetLang: 'Целевой язык', opacity: 'Непрозрачность', dragAnywhere: 'Перетаскивание везде', dragAria: 'Переключить перетаскивание', size: 'Размер', sizeSmall: 'М', sizeMedium: 'С', sizeLarge: 'Б' },
            'zh-TW': { settingsBtn: '字幕設定', targetLang: '目標語言', opacity: '不透明度', dragAnywhere: '整體拖動', dragAria: '整體拖動開關', size: '大小', sizeSmall: '小', sizeMedium: '中', sizeLarge: '大' }
        };

        function getSubLang() {
            var lang = (localStorage.getItem('userLanguage') || 'zh')
                .replace(/-cn$/i, '')
                .replace(/-tw$/i, '-TW');
            return SUBTITLE_I18N[lang] ? lang : 'zh';
        }

        function t(key) {
            var strings = SUBTITLE_I18N[getSubLang()] || SUBTITLE_I18N['zh'];
            return strings[key] || SUBTITLE_I18N['zh'][key] || key;
        }

        function applySubtitleI18N() {
            // 标签
            var labels = document.querySelectorAll('.subtitle-settings-label');
            if (labels[0]) labels[0].textContent = t('targetLang');
            if (labels[1]) labels[1].textContent = t('opacity');
            if (labels[2]) labels[2].textContent = t('dragAnywhere');
            if (labels[3]) labels[3].textContent = t('size');
            var settingsButton = document.getElementById('subtitle-settings-btn');
            if (settingsButton) {
                settingsButton.title = t('settingsBtn');
                settingsButton.setAttribute('aria-label', t('settingsBtn'));
            }
            // aria
            var toggle = document.getElementById('subtitle-drag-mode-toggle');
            if (toggle) toggle.setAttribute('aria-label', t('dragAria'));
            // title
            var sel = document.getElementById('subtitle-lang-select');
            if (sel) sel.title = t('targetLang');
            var slider = document.getElementById('subtitle-opacity-slider');
            if (slider) slider.title = t('opacity');
            // 大小按钮
            var btns = document.querySelectorAll('.subtitle-size-btn');
            var sizeKeys = { small: 'sizeSmall', medium: 'sizeMedium', large: 'sizeLarge' };
            btns.forEach(function(btn) {
                var key = sizeKeys[btn.dataset.size];
                if (key) btn.textContent = t(key);
            });
        }

        var subtitleText = document.getElementById('subtitle-text');
        var dragHandle = document.getElementById('subtitle-drag-handle');
        var api = window.nekoSubtitle;
        var settingsBtn = document.getElementById('subtitle-settings-btn');
        var settingsPanel = document.getElementById('subtitle-settings-panel');
        var langSelect = document.getElementById('subtitle-lang-select');
        var opacitySlider = document.getElementById('subtitle-opacity-slider');
        var opacityValue = document.getElementById('subtitle-opacity-value');
        var dragModeToggle = document.getElementById('subtitle-drag-mode-toggle');
        var subtitleDisplay = document.getElementById('subtitle-display');

        // ===== 设置面板交互 =====
        settingsBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            settingsPanel.classList.toggle('hidden');
            if (api && api.enableInteraction) api.enableInteraction();
        });

        document.addEventListener('mousedown', function(e) {
            if (!settingsPanel.classList.contains('hidden') &&
                !settingsPanel.contains(e.target) &&
                !settingsBtn.contains(e.target)) {
                settingsPanel.classList.add('hidden');
            }
        });

        // 语言选择
        langSelect.addEventListener('change', function() {
            if (api && api.changeSettings) {
                api.changeSettings({ type: 'language', value: langSelect.value });
            }
        });

        // 不透明度滑块（只改背景透明度，文字保持不透明）
        function applyBackgroundOpacity(val) {
            var a = val / 100;
            subtitleDisplay.style.background = 'linear-gradient(135deg, rgba(68,183,254,' + a + ') 0%, rgba(68,183,254,' + Math.max(0, a - 0.05) + ') 50%, rgba(100,200,255,' + a + ') 100%)';
        }
        var savedOpacity = localStorage.getItem('subtitleOpacity');
        if (savedOpacity) {
            opacitySlider.value = savedOpacity;
            opacityValue.textContent = savedOpacity + '%';
            applyBackgroundOpacity(savedOpacity);
        }
        opacitySlider.addEventListener('input', function() {
            var val = opacitySlider.value;
            opacityValue.textContent = val + '%';
            applyBackgroundOpacity(val);
            localStorage.setItem('subtitleOpacity', val);
        });

        // 拖动模式切换：整体拖动 vs 仅按钮拖动
        var savedDragMode = localStorage.getItem('subtitleDragAnywhere') === 'true';
        var DEFAULT_W = 600, DEFAULT_H = 80;
        if (dragModeToggle) {
            dragModeToggle.checked = savedDragMode;
            if (savedDragMode) {
                subtitleDisplay.classList.add('drag-anywhere');
                dragHandle.style.display = 'none';
                // drag-anywhere 模式下整个窗口需要可交互（关闭鼠标穿透）
                if (api && api.enableInteraction) api.enableInteraction();
            }
            dragModeToggle.addEventListener('change', function() {
                var on = dragModeToggle.checked;
                subtitleDisplay.classList.toggle('drag-anywhere', on);
                dragHandle.style.display = on ? 'none' : '';
                localStorage.setItem('subtitleDragAnywhere', on);
                // 切换模式时同步 interaction 状态
                if (api && api.enableInteraction && api.disableInteraction) {
                    if (on) {
                        api.enableInteraction();
                    } else {
                        api.disableInteraction();
                    }
                }
            });
        }

        // 大小预设：小/中/大
        var SIZES = { small: [400, 60], medium: [600, 80], large: [800, 100] };
        var DROPDOWN_H = 230; // 窗口最低高度，容纳设置下拉面板
        var savedSize = localStorage.getItem('subtitleSize') || 'medium';
        var sizeBtns = document.querySelectorAll('.subtitle-size-btn');

        function setWindowSize(w, h) {
            if (api && api.setSize) api.setSize(w, Math.max(h, DROPDOWN_H));
        }

        function applyContentHeight(h) {
            subtitleDisplay.style.minHeight = h + 'px';
        }

        sizeBtns.forEach(function(btn) {
            if (btn.dataset.size === savedSize) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
            btn.addEventListener('click', function() {
                sizeBtns.forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                var size = btn.dataset.size;
                localStorage.setItem('subtitleSize', size);
                var s = SIZES[size] || SIZES.medium;
                DEFAULT_W = s[0]; DEFAULT_H = s[1];
                applyContentHeight(s[1]);
                setWindowSize(s[0], s[1]);
            });
        });
        // 初始化时应用缓存的大小
        (function() {
            var s = SIZES[savedSize] || SIZES.medium;
            DEFAULT_W = s[0]; DEFAULT_H = s[1];
            applyContentHeight(s[1]);
            setWindowSize(s[0], s[1]);
        })();

        // 接收状态同步
        window.addEventListener('neko-subtitle-state-sync', function(e) {
            var data = e.detail;
            if (!data) return;
            if (data.language) langSelect.value = data.language;
            if (data.locale) applySubtitleI18N();
        });

        // 初始化 i18n
        applySubtitleI18N();

        // ===== 监听转写消息 =====
        window.addEventListener('neko-ws-transcript', function(e) {
            var data = e.detail;
            if (data && data.transcript != null) {
                var text = data.transcript || '';
                subtitleText.textContent = text;
                if (!text.trim()) {
                    // 空消息（用户发起新对话）→ 清空并重置窗口尺寸
                    setWindowSize(DEFAULT_W, DEFAULT_H);
                } else {
                    autoResize();
                }
            }
        });

        // ===== 自动缩放窗口（防抖，避免流式文本高频 resize 导致闪烁）=====
        var resizeTimer = null;

        function autoResize() {
            if (!api || !api.setSize) return;
            // 防抖：流式文本快速到达时，仅在最后一次更新后 150ms 才真正 resize
            if (resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(doResize, 150);
        }

        function doResize() {
            resizeTimer = null;
            var text = subtitleText.textContent || '';
            if (!text.trim()) {
                subtitleText.style.fontSize = '';
                setWindowSize(DEFAULT_W, DEFAULT_H);
                return;
            }

            var MAX_H = 280;
            var BASE_FONT = 17;
            var MIN_FONT = 12;
            var PADDING_EXTRA = 60;

            // 用隐藏元素测量
            var m = document.createElement('div');
            m.style.cssText = 'position:absolute;visibility:hidden;left:-9999px;top:-9999px;' +
                'font-size:' + BASE_FONT + 'px;font-weight:500;line-height:1.5;font-family:Segoe UI,Arial,sans-serif;' +
                'padding:10px 18px;box-sizing:border-box;white-space:nowrap;';
            m.textContent = text;
            document.body.appendChild(m);

            var singleW = m.offsetWidth + 36;
            var finalW = Math.max(200, Math.min(singleW, 800));

            // 换行测量
            m.style.whiteSpace = 'normal';
            m.style.overflowWrap = 'break-word';
            m.style.width = finalW + 'px';

            // 自适应字号：高度超限时逐步缩小
            var fontSize = BASE_FONT;
            while (m.offsetHeight + PADDING_EXTRA > MAX_H && fontSize > MIN_FONT) {
                fontSize--;
                m.style.fontSize = fontSize + 'px';
            }

            var finalH = Math.max(DEFAULT_H, m.offsetHeight + PADDING_EXTRA);
            document.body.removeChild(m);

            // 应用字号并设置窗口尺寸
            subtitleText.style.fontSize = fontSize < BASE_FONT ? fontSize + 'px' : '';
            setWindowSize(finalW, finalH);
        }

        // ===== 拖拽交互（配合 setIgnoreMouseEvents forward 模式）=====
        // 窗口默认 setIgnoreMouseEvents(true, {forward:true})
        // mousemove 能收到，但 mousedown 收不到
        // 进入 drag handle 区域时取消穿透，离开时恢复
        //
        // 拖拽委托给主进程的 DRAG_START/DRAG_STOP：主进程在 dragStart 时缓存
        // startBounds（含固定的 width/height），后续 setBounds 使用缓存尺寸，
        // 彻底避免 Windows DWM 透明窗口 getBounds() 尺寸漂移导致窗口逐渐放大。
        if (api) {
            var overHandle = false;
            var isDragging = false;

            // 拖拽结束后检测窗口是否超出屏幕，超出则回弹
            // 保证控件（设置按钮、拖拽手柄）始终可点击
            function bounceBackIfNeeded() {
                try {
                    if (typeof window.screenX !== 'number') return;
                    var MARGIN = 30;
                    var x = window.screenX;
                    var y = window.screenY;
                    var w = window.outerWidth;
                    var h = window.outerHeight;
                    if (!w || !h) return;
                    var moved = false;

                    // 左/上：控件区域不可见时回弹到 0
                    if (x < 0) { x = 0; moved = true; }
                    if (y < 0) { y = 0; moved = true; }
                    // 右/下：至少保留 MARGIN 像素在屏幕内
                    if (x + w - MARGIN > screen.availWidth) {
                        x = Math.max(0, screen.availWidth - w);
                        moved = true;
                    }
                    if (y + h - MARGIN > screen.availHeight) {
                        y = Math.max(0, screen.availHeight - h);
                        moved = true;
                    }

                    if (moved) window.moveTo(x, y);
                } catch(e) {}
            }

            function isDragAnywhereMode() {
                return subtitleDisplay.classList.contains('drag-anywhere');
            }

            document.addEventListener('mousemove', function(e) {
                if (isDragging) return;
                if (isDragAnywhereMode()) return;
                var el = document.elementFromPoint(e.clientX, e.clientY);
                var isOnHandle = !!el && (
                    dragHandle.contains(el) ||
                    (settingsBtn && settingsBtn.contains(el)) ||
                    (settingsPanel && settingsPanel.contains(el))
                );
                if (isOnHandle && !overHandle) {
                    overHandle = true;
                    api.enableInteraction();
                } else if (!isOnHandle && overHandle) {
                    overHandle = false;
                    api.disableInteraction();
                }
            });

            function startDrag(e) {
                if (settingsPanel.contains(e.target)) return;
                if (settingsBtn && settingsBtn.contains(e.target)) return;
                isDragging = true;
                api.dragStart();
                e.preventDefault();
            }

            dragHandle.addEventListener('mousedown', function(e) {
                if (isDragAnywhereMode()) return;
                startDrag(e);
                dragHandle.style.cursor = 'grabbing';
            });
            dragHandle.addEventListener('touchstart', function(e) {
                if (isDragAnywhereMode()) return;
                startDrag(e);
                dragHandle.style.cursor = 'grabbing';
            });

            subtitleDisplay.addEventListener('mousedown', function(e) {
                if (!isDragAnywhereMode()) return;
                startDrag(e);
            });
            subtitleDisplay.addEventListener('touchstart', function(e) {
                if (!isDragAnywhereMode()) return;
                startDrag(e);
            });

            document.addEventListener('mouseup', function() {
                if (isDragging) {
                    dragHandle.style.cursor = '';
                    isDragging = false;
                    api.dragStop();
                    bounceBackIfNeeded();
                    if (!isDragAnywhereMode() && !overHandle) {
                        api.disableInteraction();
                    }
                }
            });

            document.addEventListener('mouseleave', function() {
                if (!isDragging && !isDragAnywhereMode()) {
                    overHandle = false;
                    api.disableInteraction();
                }
            });

            // 窗口获得焦点或屏幕尺寸变化时也检查是否超出屏幕
            window.addEventListener('focus', bounceBackIfNeeded);
            window.addEventListener('resize', bounceBackIfNeeded);
        }
    </script>
</body>
</html>
