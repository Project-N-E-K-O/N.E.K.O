name: DataForSEO SEO Report

on:
  schedule:
    # 07:30 Asia/Shanghai (GitHub Actions cron uses UTC).
    - cron: '30 23 * * *'
  pull_request:
    paths:
      - 'docs/scripts/dataforseo/**'
      - 'docs/scripts/seo-monitoring/**'
      - 'docs/seo/dataforseo.config.json'
      - 'docs/seo/monitoring.config.json'
      - 'docs/package.json'
      - '.github/workflows/dataforseo.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'dry-run spends nothing; other modes call paid DataForSEO endpoints'
        required: true
        type: choice
        default: dry-run
        options:
          - dry-run
          - keywords
          - serp
          - all
      serp_depth:
        description: 'Organic results per keyword (1-100; each 10 results may add cost)'
        required: true
        type: string
        default: '10'
      include_ai_overview:
        description: 'Load asynchronous AI Overview results (extra charge per SERP request)'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: dataforseo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    if: github.event_name != 'schedule' || vars.ENABLE_PAID_DATAFORSEO_SCHEDULE == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install documentation dependencies
        run: npm ci
        working-directory: docs

      - name: Test DataForSEO tooling
        run: npm run test:dataforseo
        working-directory: docs

      - name: Test unified SEO/GEO reporting
        run: npm run test:seo-monitoring
        working-directory: docs

      - name: Validate the committed request plan
        run: npm run seo:dataforseo -- --dry-run --output .seo-reports/dry-run.json
        working-directory: docs

  report:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && vars.ENABLE_PAID_DATAFORSEO_SCHEDULE == 'true')
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      REPORT_MODE: ${{ github.event_name == 'schedule' && 'serp' || inputs.mode }}
      SERP_DEPTH: ${{ github.event_name == 'schedule' && '10' || inputs.serp_depth }}
      INCLUDE_AI_OVERVIEW: ${{ github.event_name == 'schedule' && 'false' || inputs.include_ai_overview }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install documentation dependencies
        run: npm ci
        working-directory: docs

      - name: Require credentials for paid modes
        if: env.REPORT_MODE != 'dry-run'
        shell: bash
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: |
          if [[ -z "$DATAFORSEO_LOGIN" || -z "$DATAFORSEO_PASSWORD" ]]; then
            echo "Set DATAFORSEO_LOGIN and DATAFORSEO_PASSWORD as repository or environment secrets." >&2
            exit 1
          fi

      - name: Generate dry-run report
        if: env.REPORT_MODE == 'dry-run'
        shell: bash
        working-directory: docs
        run: |
          args=(--mode all --dry-run --depth "$SERP_DEPTH" --output ".seo-reports/dataforseo-${GITHUB_RUN_ID}.json")
          if [[ "$INCLUDE_AI_OVERVIEW" == "true" ]]; then
            args+=(--include-ai-overview)
          fi
          npm run seo:dataforseo -- "${args[@]}"

      - name: Generate paid report
        if: env.REPORT_MODE != 'dry-run'
        shell: bash
        working-directory: docs
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: |
          args=(--mode "$REPORT_MODE" --depth "$SERP_DEPTH" --output ".seo-reports/dataforseo-${GITHUB_RUN_ID}.json")
          if [[ "$INCLUDE_AI_OVERVIEW" == "true" ]]; then
            args+=(--include-ai-overview)
          fi
          npm run seo:dataforseo -- "${args[@]}"

      - name: Generate unified DataForSEO, GSC, and GA4 summary
        if: always()
        shell: bash
        working-directory: docs
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ vars.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ vars.GSC_SITE_URL }}
        run: >-
          npm run seo:report --
          --dataforseo ".seo-reports/dataforseo-${GITHUB_RUN_ID}.json"
          --output-json ".seo-reports/seo-monitoring-${GITHUB_RUN_ID}.json"
          --output-markdown ".seo-reports/seo-monitoring-${GITHUB_RUN_ID}.md"

      - name: Publish unified report in the run summary
        if: always()
        shell: bash
        run: |
          report="docs/.seo-reports/seo-monitoring-${GITHUB_RUN_ID}.md"
          if [[ -f "$report" ]]; then cat "$report" >> "$GITHUB_STEP_SUMMARY"; fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dataforseo-report-${{ github.run_id }}
          path: docs/.seo-reports/**
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14
