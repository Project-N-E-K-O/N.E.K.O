name: Docker Build

on:
  push:
    tags:
      - 'v*' # 匹配 v 开头的标签，例如 v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本号 (例如: 1.0.0-beta.1)'
        required: true
        default: 'PLEASE-SET-VERSION'
      skip_dockerhub:
        description: '跳过 Docker Hub 推送 (仅推送到 GHCR)'
        type: boolean
        required: false
        default: false

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: project-n-e-k-o/n.e.k.o

jobs:
  # ============================================================================
  # Job 1: Calculate version (shared by all build jobs)
  # ============================================================================
  calculate-version:
    runs-on: ubuntu-latest
    outputs:
      image_version: ${{ steps.version_calc.outputs.VERSION }}
      skip_dockerhub: ${{ steps.calc_skip.outputs.SKIP_DOCKERHUB }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate skip_dockerhub flag
        id: calc_skip
        run: |
          # For manual dispatch, use the input value; for tag push, default to false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "SKIP_DOCKERHUB=${{ github.event.inputs.skip_dockerhub || 'false' }}" >> $GITHUB_OUTPUT
          else
            echo "SKIP_DOCKERHUB=false" >> $GITHUB_OUTPUT
          fi

      - name: Calculate Docker image version
        id: version_calc
        run: |
          # 策略1: 如果是由 git tag 触发，则使用 tag 作为版本号 (去掉 'v' 前缀)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "版本号来源于Git标签: $VERSION"
          # 策略2: 如果手动触发，则使用 input 中的 version 参数
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "版本号来源于手动输入: $VERSION"
          # 策略3: 默认情况，生成基于日期和提交哈希的版本号
          else
            COMMIT_SHORT=$(git rev-parse --short HEAD)
            DATE=$(date +%Y%m%d)
            VERSION="${DATE}-${COMMIT_SHORT}"
            echo "版本号为自动生成: $VERSION"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  # ============================================================================
  # Job 2: Build and push STANDARD version (parallel with full version)
  # ============================================================================
  build-standard:
    needs: calculate-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: needs.calculate-version.outputs.skip_dockerhub != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker (GHCR only)
        if: needs.calculate-version.outputs.skip_dockerhub == 'true'
        id: meta_ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.calculate-version.outputs.image_version }},suffix=-standard
            type=raw,value=latest-standard,enable={{is_default_branch}}

      - name: Extract metadata for Docker (both registries)
        if: needs.calculate-version.outputs.skip_dockerhub != 'true'
        id: meta_both
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
            ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o
          tags: |
            type=raw,value=${{ needs.calculate-version.outputs.image_version }},suffix=-standard
            type=raw,value=latest-standard,enable={{is_default_branch}}

      - name: Build and push standard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta_ghcr.outputs.tags || steps.meta_both.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels || steps.meta_both.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Job 3: Build and push FULL version (parallel with standard version)
  # ============================================================================
  build-full:
    needs: calculate-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: needs.calculate-version.outputs.skip_dockerhub != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker (GHCR only)
        if: needs.calculate-version.outputs.skip_dockerhub == 'true'
        id: meta_ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.calculate-version.outputs.image_version }},suffix=-full
            type=raw,value=latest-full,enable={{is_default_branch}}

      - name: Extract metadata for Docker (both registries)
        if: needs.calculate-version.outputs.skip_dockerhub != 'true'
        id: meta_both
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
            ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o
          tags: |
            type=raw,value=${{ needs.calculate-version.outputs.image_version }},suffix=-full
            type=raw,value=latest-full,enable={{is_default_branch}}

      - name: Build and push full image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.full
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta_ghcr.outputs.tags || steps.meta_both.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels || steps.meta_both.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Job 4: Create multi-arch manifests (runs after both versions are built)
  # ============================================================================
  create-manifests:
    needs: [calculate-version, build-standard, build-full]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: needs.calculate-version.outputs.skip_dockerhub != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest for standard version (GHCR)
        run: |
          VERSION=${{ needs.calculate-version.outputs.image_version }}

          docker manifest create \
            ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}-standard \
            --amend ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}-standard-linux-amd64 \
            --amend ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}-standard-linux-arm64
          docker manifest push ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}-standard

      - name: Create and push multi-arch manifest for standard version (DockerHub)
        if: needs.calculate-version.outputs.skip_dockerhub != 'true'
        run: |
          VERSION=${{ needs.calculate-version.outputs.image_version }}

          docker manifest create \
            ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:${VERSION}-standard \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:${VERSION}-standard-linux-amd64 \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:${VERSION}-standard-linux-arm64
          docker manifest push ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:${VERSION}-standard

      - name: Create and push multi-arch manifest for full version (GHCR)
        run: |
          VERSION=${{ needs.calculate-version.outputs.image_version }}

          docker manifest create \
            ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}-full \
            --amend ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}-full-linux-amd64 \
            --amend ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}-full-linux-arm64
          docker manifest push ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}-full

      - name: Create and push multi-arch manifest for full version (DockerHub)
        if: needs.calculate-version.outputs.skip_dockerhub != 'true'
        run: |
          VERSION=${{ needs.calculate-version.outputs.image_version }}

          docker manifest create \
            ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:${VERSION}-full \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:${VERSION}-full-linux-amd64 \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:${VERSION}-full-linux-arm64
          docker manifest push ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:${VERSION}-full

      - name: Create and push latest manifests (GHCR)
        run: |
          VERSION=${{ needs.calculate-version.outputs.image_version }}

          # GHCR - latest-standard
          docker manifest create \
            ghcr.io/${{ env.IMAGE_NAME }}:latest-standard \
            --amend ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}-standard-linux-amd64 \
            --amend ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}-standard-linux-arm64
          docker manifest push ghcr.io/${{ env.IMAGE_NAME }}:latest-standard

          # GHCR - latest-full
          docker manifest create \
            ghcr.io/${{ env.IMAGE_NAME }}:latest-full \
            --amend ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}-full-linux-amd64 \
            --amend ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}-full-linux-arm64
          docker manifest push ghcr.io/${{ env.IMAGE_NAME }}:latest-full

      - name: Create and push latest manifests (DockerHub)
        if: needs.calculate-version.outputs.skip_dockerhub != 'true'
        run: |
          VERSION=${{ needs.calculate-version.outputs.image_version }}

          # DockerHub - latest-standard
          docker manifest create \
            ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:latest-standard \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:${VERSION}-standard-linux-amd64 \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:${VERSION}-standard-linux-arm64
          docker manifest push ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:latest-standard

          # DockerHub - latest-full
          docker manifest create \
            ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:latest-full \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:${VERSION}-full-linux-amd64 \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:${VERSION}-full-linux-arm64
          docker manifest push ${{ secrets.DOCKERHUB_USERNAME }}/n.e.k.o:latest-full
