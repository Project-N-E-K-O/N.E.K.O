name: Nightly Build

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  EMBEDDING_MODEL_REPO: jinaai/jina-embeddings-v5-text-nano-retrieval
  EMBEDDING_MODEL_PROFILE_ID: local-text-retrieval-v1
  # Pin upstream weights/tokenizer to a specific commit. The profile id is the
  # cache compatibility contract — a moving branch would let upstream drift
  # while the id stays the same, breaking reproducibility across nightlies.
  EMBEDDING_MODEL_REVISION: ac5d898c8d382b17167c33e5c8af644a3519b47d

jobs:
  launcher-pyinstaller:
    if: github.repository == 'Project-N-E-K-O/N.E.K.O'
    name: PyInstaller launcher (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"

      - name: Install Python dependencies
        run: |
          uv sync --extra embeddings
          uv pip install pyinstaller==6.12.0

      - name: Build frontends
        run: bash build_frontend.sh

      - name: Prepare embedding model assets
        run: |
          uv run python scripts/prepare_embedding_model.py \
            --repo "$EMBEDDING_MODEL_REPO" \
            --revision "$EMBEDDING_MODEL_REVISION" \
            --profile-id "$EMBEDDING_MODEL_PROFILE_ID" \
            --output-root data/embedding_models \
            --variant both

      - name: Build launcher with PyInstaller
        run: uv run pyinstaller specs/launcher.spec --noconfirm

      - name: Verify bundled embedding assets
        shell: bash
        # memory/embeddings.py treats the onnx_data sidecars and the int8
        # quantized weights as required at session-load time. CI must mirror
        # that contract — silently shipping an artifact missing them would
        # have the runtime sticky-disable vectors with model_file_missing.
        run: |
          set -euo pipefail
          required=(
            "tokenizer.json"
            "onnx/model.onnx"
            "onnx/model.onnx_data"
            "onnx/model_quantized.onnx"
            "onnx/model_quantized.onnx_data"
          )
          # -s (non-empty) instead of -f (exists): a zero-byte tokenizer or
          # onnx blob still passes -f but is broken at runtime, and matches
          # prepare_embedding_model.py's own non-empty contract.
          missing=0
          for rel in "${required[@]}"; do
            if [ ! -s "dist/N.E.K.O/_internal/data/embedding_models/$EMBEDDING_MODEL_PROFILE_ID/$rel" ] \
                && [ ! -s "dist/N.E.K.O/data/embedding_models/$EMBEDDING_MODEL_PROFILE_ID/$rel" ]; then
              echo "::error::missing or empty bundled embedding asset: $rel"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Upload nightly artifact
        uses: actions/upload-artifact@v4
        with:
          name: neko-pyinstaller-${{ matrix.os }}
          path: dist/N.E.K.O
          retention-days: 7
