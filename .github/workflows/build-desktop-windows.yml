name: Build Desktop App (Windows Only)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0-beta.1)'
        required: false
        default: ''
      electron_repo:
        description: 'Electron frontend repo (owner/repo)'
        required: false
        default: 'Project-N-E-K-O/N.E.K.O.-PC'
      electron_ref:
        description: 'Electron repo branch/tag/commit'
        required: false
        default: 'main'
      skip_signing:
        description: 'Skip code signing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build-windows:
    uses: ./.github/workflows/build-desktop.yml
    with:
      version: ${{ inputs.version }}
      electron_repo: ${{ inputs.electron_repo }}
      electron_ref: ${{ inputs.electron_ref }}
      skip_signing: ${{ inputs.skip_signing }}
      windows_only: true
    secrets: inherit
