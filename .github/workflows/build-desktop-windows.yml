name: Build Desktop App (Windows Only)

on:
  push:
    branches:
      - 'ci/portable-update'
    paths:
      - '.github/workflows/build-desktop-windows.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0-beta.1)'
        required: false
        default: ''
      electron_repo:
        description: 'Electron frontend repo (owner/repo)'
        required: false
        default: 'Project-N-E-K-O/N.E.K.O.-PC'
      electron_ref:
        description: 'Electron repo branch/tag/commit'
        required: false
        default: 'main'
      skip_signing:
        description: 'Skip code signing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      previous_portable_release:
        description: 'Release tag used as the Portable delta baseline'
        required: false
        default: 'nightly'

jobs:
  build-windows:
    uses: ./.github/workflows/build-desktop.yml
    with:
      version: ${{ inputs.version || '0.8.4-nightly.2' }}
      electron_repo: ${{ inputs.electron_repo || 'xxynet/N.E.K.O.-PC' }}
      electron_ref: ${{ inputs.electron_ref || 'feat/auto-update' }}
      skip_signing: ${{ inputs.skip_signing || 'true' }}
      windows_only: true
      previous_portable_release: ${{ inputs.previous_portable_release || 'nightly' }}
    secrets: inherit
