[plugin]
name = "B站私信"
description = "接入 B站私信，实现与用户的 AI 自动对话。支持文本、图片、分享视频等消息类型。"
short_description = "B站私信自动回复，通过 bilibili_api 监听私信并自动回复。"
keywords = ["bilibili", "b站", "私信", "dm"]
passive = true
version = "1.1.3"
id = "bilibili_dm"
type = "plugin"
entry = "plugin.plugins.bilibili_dm:BiliDMPlugin"

[plugin.author]
name = "xxynet"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

[plugin.store]
enabled = true

[plugin.ui]
enabled = true

[[plugin.ui.panel]]
id = "main"
title = "B站私信"
entry = "static/index.html"
context = "bilibili_dm"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "quickstart"
title = "快速开始"
entry = "README.md"
permissions = ["state:read"]

[plugin_runtime]
enabled = true
auto_start = false
