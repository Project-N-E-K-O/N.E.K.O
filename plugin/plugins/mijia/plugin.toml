[plugin]
id = "mijia"
name = "米家智能家居"
description = "控制米家设备，让AI伙伴帮你开关灯、调节空调等"
version = "1.0.0"
entry = "plugins.mijia:MijiaPlugin"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.dependencies]
# 这些依赖由 N.E.K.O 主环境提供，无需额外安装
# 插件启动时会检查
required = ["httpx", "pydantic", "qrcode", "tenacity", "cachetools"]