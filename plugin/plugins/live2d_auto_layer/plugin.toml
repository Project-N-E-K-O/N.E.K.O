[plugin]
id = "live2d_auto_layer"
name = "Live2D Auto Layer"
description = "Semi-automatic Live2D layer extraction based on anime face landmarks, SAM, matting, and transparent PNG export."
short_description = "Split character images into Live2D-ready transparent layers."
keywords = ["live2d", "layer", "anime", "sam", "matting", "image", "character", "psd"]
version = "0.1.0"
type = "plugin"
entry = "plugin.plugins.live2d_auto_layer:Live2dAutoLayerPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.i18n]
default_locale = "en"
locales_dir = "i18n"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin_runtime]
enabled = true
auto_start = false

[plugin.ui]
enabled = true

[[plugin.ui.panel]]
id = "main"
title = "Live2D Auto Layer"
entry = "ui/panel.tsx"
context = "dashboard"
permissions = [
    "state:read",
    "action:call",
]
