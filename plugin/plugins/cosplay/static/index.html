<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N.E.K.O Cosplay 剧场</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --surface2: #1e1e2e;
      --border: #2a2a3a;
      --text: #e0e0f0;
      --text2: #8888aa;
      --accent: #ff6b9d;
      --accent2: #c084fc;
      --success: #4ade80;
      --warning: #fbbf24;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── 导航 ── */
    .nav { display:flex; gap:8px; padding:16px 24px; background:var(--surface); border-bottom:1px solid var(--border); }
    .nav-brand { font-size:1.2em; font-weight:700; background:linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-right:auto; }
    .nav-btn { background:transparent; border:1px solid var(--border); color:var(--text2); padding:8px 16px; border-radius:8px; cursor:pointer; transition:all .2s; }
    .nav-btn:hover, .nav-btn.active { background:var(--surface2); color:var(--text); border-color:var(--accent); }

    /* ── 页面容器 ── */
    .page { display:none; padding:24px; max-width:1200px; margin:0 auto; }
    .page.active { display:block; }

    /* ── 仪表盘 ── */
    .dash-hero { text-align:center; padding:48px 0 32px; }
    .dash-hero h1 { font-size:2em; margin-bottom:8px; }
    .dash-hero p { color:var(--text2); }
    .quick-actions { display:flex; gap:16px; justify-content:center; margin:32px 0; }
    .quick-btn { background:linear-gradient(135deg, var(--accent), var(--accent2)); border:none; color:#fff; padding:20px 32px; border-radius:var(--radius); font-size:1.1em; cursor:pointer; transition:transform .2s; }
    .quick-btn:hover { transform:scale(1.05); }
    .section-title { font-size:1.2em; margin:32px 0 16px; color:var(--text2); }

    /* ── 卡片网格 ── */
    .card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:all .2s; }
    .card:hover { border-color:var(--accent); transform:translateY(-2px); }
    .card-cover { height:160px; background:var(--surface2); display:flex; align-items:center; justify-content:center; color:var(--text2); font-size:3em; }
    .card-body { padding:16px; }
    .card-title { font-weight:600; margin-bottom:4px; }
    .card-meta { color:var(--text2); font-size:0.85em; }
    .card-tags { display:flex; gap:4px; margin-top:8px; flex-wrap:wrap; }
    .tag { background:var(--surface2); color:var(--accent2); padding:2px 8px; border-radius:4px; font-size:0.75em; }

    /* ── 剧场模式 ── */
    .theater-layout { display:grid; grid-template-columns:1fr 320px; gap:24px; }
    .stage-area { background:var(--surface); border-radius:var(--radius); min-height:400px; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .stage-image { max-width:100%; max-height:400px; object-fit:contain; }
    .stage-text-overlay { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.7); padding:16px; }
    .stage-char-name { color:var(--accent); font-weight:600; }
    .stage-dialogue { margin-top:4px; }
    .stage-narration { color:var(--text2); font-style:italic; }
    .stage-controls { display:flex; gap:8px; padding:16px; justify-content:center; }
    .ctrl-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:8px 16px; border-radius:8px; cursor:pointer; }
    .ctrl-btn:hover { border-color:var(--accent); }
    .ctrl-btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }

    .script-panel { background:var(--surface); border-radius:var(--radius); padding:16px; }
    .script-input { width:100%; min-height:300px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:12px; font-family:monospace; font-size:0.9em; resize:vertical; }
    .script-input:focus { outline:none; border-color:var(--accent); }
    .panel-actions { display:flex; gap:8px; margin-top:12px; }

    /* ── 互动模式 ── */
    .chat-layout { display:grid; grid-template-columns:1fr 300px; gap:24px; height:calc(100vh - 120px); }
    .chat-main { display:flex; flex-direction:column; background:var(--surface); border-radius:var(--radius); overflow:hidden; }
    .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .msg { max-width:80%; padding:12px 16px; border-radius:12px; }
    .msg.user { background:var(--accent); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
    .msg.assistant { background:var(--surface2); align-self:flex-start; border-bottom-left-radius:4px; }
    .msg-image { max-width:300px; border-radius:8px; margin-top:8px; }
    .msg-scene { color:var(--text2); font-size:0.8em; margin-top:4px; font-style:italic; }
    .chat-input-area { display:flex; gap:8px; padding:16px; border-top:1px solid var(--border); }
    .chat-input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:12px; resize:none; }
    .chat-input:focus { outline:none; border-color:var(--accent); }
    .send-btn { background:var(--accent); border:none; color:#fff; padding:12px 20px; border-radius:8px; cursor:pointer; }

    .chat-sidebar { background:var(--surface); border-radius:var(--radius); padding:16px; overflow-y:auto; }
    .char-avatar { width:80px; height:80px; border-radius:50%; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:2em; margin:0 auto 12px; }
    .char-name { text-align:center; font-weight:600; margin-bottom:4px; }
    .char-desc { color:var(--text2); font-size:0.85em; text-align:center; margin-bottom:16px; }
    .goal-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:8px; font-size:0.85em; }
    .goal-input:focus { outline:none; border-color:var(--accent); }

    /* ── 角色库 ── */
    .char-create-form { background:var(--surface); border-radius:var(--radius); padding:24px; margin-bottom:24px; }
    .form-row { display:flex; gap:12px; margin-bottom:12px; }
    .form-field { flex:1; }
    .form-field label { display:block; color:var(--text2); font-size:0.85em; margin-bottom:4px; }
    .form-field input, .form-field select, .form-field textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:8px; }
    .form-field input:focus, .form-field select:focus, .form-field textarea:focus { outline:none; border-color:var(--accent); }

    /* ── 作品详情 ── */
    .work-detail { background:var(--surface); border-radius:var(--radius); padding:24px; }
    .work-gallery { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:8px; margin-top:16px; }
    .work-gallery img { width:100%; border-radius:8px; cursor:pointer; }

    /* ── 通用 ── */
    .empty-state { text-align:center; padding:48px; color:var(--text2); }
    .loading { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .badge { background:var(--accent); color:#fff; padding:2px 6px; border-radius:4px; font-size:0.7em; }
  </style>
</head>
<body>
  <!-- 导航 -->
  <nav class="nav">
    <span class="nav-brand">🎭 N.E.K.O Cosplay</span>
    <button class="nav-btn active" data-page="dashboard">仪表盘</button>
    <button class="nav-btn" data-page="theater">剧场</button>
    <button class="nav-btn" data-page="interactive">互动</button>
    <button class="nav-btn" data-page="characters">角色库</button>
    <button class="nav-btn" data-page="works">作品集</button>
  </nav>

  <!-- 仪表盘 -->
  <section class="page active" id="page-dashboard">
    <div class="dash-hero">
      <h1>🎭 Cosplay 剧场</h1>
      <p>创作你的角色，演绎你的故事</p>
    </div>
    <div class="quick-actions">
      <button class="quick-btn" onclick="switchPage('theater')">🎬 开始剧场</button>
      <button class="quick-btn" onclick="switchPage('interactive')">💬 开始互动</button>
    </div>
    <h3 class="section-title">最近作品</h3>
    <div class="card-grid" id="recentWorks">
      <div class="empty-state">还没有作品，开始创作吧！</div>
    </div>
    <h3 class="section-title">我的角色</h3>
    <div class="card-grid" id="recentChars">
      <div class="empty-state">还没有角色，去角色库创建吧！</div>
    </div>
  </section>

  <!-- 剧场模式 -->
  <section class="page" id="page-theater">
    <div class="theater-layout">
      <div>
        <div class="stage-area" id="stageArea">
          <div class="empty-state">准备剧本后开始演出</div>
        </div>
        <div class="stage-controls">
          <button class="ctrl-btn" onclick="theaterPrev()">◀ 上一幕</button>
          <button class="ctrl-btn primary" onclick="theaterConfirm()">确认台词 ▶</button>
          <button class="ctrl-btn" onclick="theaterNext()">下一幕 ▶</button>
        </div>
      </div>
      <div class="script-panel">
        <h3 style="margin-bottom:12px">剧本编辑</h3>
        <textarea class="script-input" id="scriptInput" placeholder="在此粘贴或编写 cosplay 剧本...

格式示例：
【角色】
  雪乃：黑长直少女，温柔内敛
  服装：白色和服，蓝色腰带
  场景：黄昏，樱花神社

【第1幕：相遇】
  [镜头：全景]
  [场景：神社鸟居前，夕阳西下]
  [动作：雪乃站在鸟居下]

  雪乃：你又迟到了。
  （内心）每次都这样..."></textarea>
        <div class="panel-actions">
          <button class="ctrl-btn primary" onclick="prepareScript()">🎬 解析剧本</button>
          <button class="ctrl-btn" onclick="loadTemplate()">📋 加载模板</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 互动模式 -->
  <section class="page" id="page-interactive">
    <div class="chat-layout">
      <div class="chat-main">
        <div class="chat-messages" id="chatMessages">
          <div class="empty-state">选择角色后开始对话</div>
        </div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="chatInput" rows="2" placeholder="输入消息..."></textarea>
          <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
      </div>
      <div class="chat-sidebar">
        <div class="char-avatar" id="chatAvatar">🎭</div>
        <div class="char-name" id="chatCharName">未选择角色</div>
        <div class="char-desc" id="chatCharDesc">请先从角色库选择或创建角色</div>
        <hr style="border-color:var(--border); margin:16px 0">
        <label style="color:var(--text2); font-size:0.85em">情境目标（可选）</label>
        <input class="goal-input" id="goalInput" placeholder="如：一起逛漫展、拍摄写真..." style="margin-top:4px">
        <button class="ctrl-btn" style="width:100%; margin-top:8px" onclick="setGoal()">设置目标</button>
        <hr style="border-color:var(--border); margin:16px 0">
        <button class="ctrl-btn" style="width:100%" onclick="selectCharacter()">选择角色</button>
        <button class="ctrl-btn" style="width:100%; margin-top:8px" onclick="endSession()">结束会话</button>
      </div>
    </div>
  </section>

  <!-- 角色库 -->
  <section class="page" id="page-characters">
    <h2 style="margin-bottom:16px">角色库</h2>
    <div class="char-create-form" id="charForm">
      <h3 style="margin-bottom:16px">创建新角色</h3>
      <div class="form-row">
        <div class="form-field">
          <label>角色名</label>
          <input id="charName" placeholder="如：雪乃">
        </div>
        <div class="form-field">
          <label>模板</label>
          <select id="charTemplate" onchange="applyTemplate()">
            <option value="">自定义</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>性别</label><input id="charGender" placeholder="男/女"></div>
        <div class="form-field"><label>发型</label><input id="charHair" placeholder="如：黑长直"></div>
        <div class="form-field"><label>性格</label><input id="charPersonality" placeholder="如：温柔"></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>服装名</label><input id="costumeName" placeholder="如：白色和服"></div>
        <div class="form-field"><label>服装风格</label><input id="costumeStyle" placeholder="和风/现代/奇幻..."></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>场景</label><input id="sceneName" placeholder="如：樱花神社"></div>
        <div class="form-field"><label>氛围</label><input id="sceneMood" placeholder="如：浪漫"></div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>自由描述</label>
          <textarea id="charDesc" rows="2" placeholder="补充描述..."></textarea>
        </div>
      </div>
      <button class="ctrl-btn primary" onclick="createCharacter()">✨ 创建角色</button>
    </div>
    <h3 class="section-title">已有角色</h3>
    <div class="card-grid" id="charList">
      <div class="empty-state">还没有角色</div>
    </div>
  </section>

  <!-- 作品集 -->
  <section class="page" id="page-works">
    <h2 style="margin-bottom:16px">作品集</h2>
    <div class="card-grid" id="worksList">
      <div class="empty-state">还没有作品</div>
    </div>
  </section>

  <script>
    // ── 页面导航 ──
    function switchPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + page)?.classList.add('active');
      document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
    }
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => switchPage(btn.dataset.page));
    });

    // ── API 调用 ──
    const API_BASE = '/plugin/cosplay_plugin/api';
    async function api(entryId, params = {}) {
      try {
        const resp = await fetch(`${API_BASE}/entry/${entryId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(params),
        });
        return await resp.json();
      } catch (e) {
        console.error('API error:', e);
        return { error: e.message };
      }
    }

    // ── 剧场模式 ──
    async function prepareScript() {
      const text = document.getElementById('scriptInput').value;
      if (!text.trim()) return alert('请先输入剧本');
      const result = await api('prepare_script', { script_text: text });
      if (result.error) return alert('解析失败: ' + result.error);
      alert(`剧本解析完成！共 ${result.total_turns || 0} 幕`);
    }

    function theaterPrev() { api('confirm_current_line', { direction: 'prev' }); }
    function theaterNext() { api('confirm_current_line', { direction: 'next' }); }
    function theaterConfirm() { api('confirm_current_line'); }
    function loadTemplate() {
      const tmpl = `【角色】
  雪乃：黑长直少女，温柔内敛
  服装：白色和服，蓝色腰带，木屐
  场景：黄昏，樱花神社，花瓣飘落

  悠太：棕发少年，开朗活泼
  服装：黑色校服，领带松散

【第1幕：相遇】
  [镜头：全景]
  [场景：神社鸟居前，夕阳西下]
  [动作：雪乃站在鸟居下，悠太从远处跑来]

  雪乃：你又迟到了。
  悠太：抱歉抱歉！路上遇到只猫...
  [动作：悠太双手合十道歉]
  [镜头：特写]
  （内心）每次都这样，但看到他的笑脸就气不起来了。`;
      document.getElementById('scriptInput').value = tmpl;
    }

    // ── 互动模式 ──
    let currentChatChar = null;

    function selectCharacter() {
      const name = prompt('输入角色名（从角色库中选择）:');
      if (name) {
        currentChatChar = name;
        document.getElementById('chatCharName').textContent = name;
        document.getElementById('chatCharDesc').textContent = '角色已选择';
        document.getElementById('chatMessages').innerHTML = `<div class="msg assistant">你好！我是${name}，很高兴见到你~</div>`;
      }
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      const msgs = document.getElementById('chatMessages');
      msgs.innerHTML += `<div class="msg user">${escapeHtml(text)}</div>`;

      const result = await api('interactive_send', { text, character: currentChatChar });
      if (result.text) {
        let html = `<div class="msg assistant">${escapeHtml(result.text)}`;
        if (result.image_url) html += `<br><img class="msg-image" src="${result.image_url}">`;
        if (result.scene) html += `<div class="msg-scene">📷 ${escapeHtml(result.scene)}</div>`;
        html += `</div>`;
        msgs.innerHTML += html;
        msgs.scrollTop = msgs.scrollHeight;
      }
    }

    function setGoal() {
      const goal = document.getElementById('goalInput').value.trim();
      if (goal) api('set_interactive_goal', { goal });
    }

    function endSession() {
      api('end_interactive_session');
      currentChatChar = null;
      document.getElementById('chatCharName').textContent = '未选择角色';
      document.getElementById('chatMessages').innerHTML = '<div class="empty-state">会话已结束</div>';
    }

    // ── 角色库 ──
    async function createCharacter() {
      const data = {
        name: document.getElementById('charName').value,
        description: document.getElementById('charDesc').value,
        structured: {
          gender: document.getElementById('charGender').value,
          hair_style: document.getElementById('charHair').value,
          personality: document.getElementById('charPersonality').value,
        },
        costume: {
          name: document.getElementById('costumeName').value,
          style: document.getElementById('costumeStyle').value,
        },
        scene: {
          name: document.getElementById('sceneName').value,
          mood: document.getElementById('sceneMood').value,
        },
      };
      const result = await api('create_character', data);
      if (result.error) return alert('创建失败: ' + result.error);
      alert('角色创建成功！');
      loadCharacters();
    }

    async function loadCharacters() {
      const result = await api('list_characters');
      const grid = document.getElementById('charList');
      if (!result.characters?.length) {
        grid.innerHTML = '<div class="empty-state">还没有角色</div>';
        return;
      }
      grid.innerHTML = result.characters.map(c => `
        <div class="card" onclick="selectCharForChat('${c.id}', '${escapeHtml(c.name)}')">
          <div class="card-cover">🎭</div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(c.name)}</div>
            <div class="card-meta">${escapeHtml(c.costume_name || '')} · ${escapeHtml(c.scene_name || '')}</div>
          </div>
        </div>
      `).join('');
    }

    function selectCharForChat(id, name) {
      currentChatChar = name;
      document.getElementById('chatCharName').textContent = name;
      switchPage('interactive');
    }

    async function applyTemplate() {
      const tmplId = document.getElementById('charTemplate').value;
      if (!tmplId) return;
      const result = await api('get_template', { template_id: tmplId });
      if (result.template) {
        const t = result.template;
        if (t.character?.structured) {
          document.getElementById('charGender').value = t.character.structured.gender || '';
          document.getElementById('charHair').value = t.character.structured.hair_style || '';
          document.getElementById('charPersonality').value = t.character.structured.personality || '';
        }
        if (t.character?.costume) {
          document.getElementById('costumeName').value = t.character.costume.name || '';
          document.getElementById('costumeStyle').value = t.character.costume.style || '';
        }
        if (t.character?.scene) {
          document.getElementById('sceneName').value = t.character.scene.name || '';
          document.getElementById('sceneMood').value = t.character.scene.mood || '';
        }
      }
    }

    // ── 工具 ──
    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ── 初始化 ──
    document.getElementById('chatInput')?.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
