[plugin]
name = "QQ集成"
description = "通过 NapCat（OneBot 反向 WebSocket）或 QQ 官方开放平台接入，回复引用链解析、语音/表情包/戳一戳等多模态输出。"
short_description = "NapCat/开放平台双通道、注意力门控、缓冲合并、回溯补回、多模态交互"
keywords = ["qq", "onebot", "napcat", "qq-open-platform", "auto-reply", "chat", "attention", "fatigue", "sticker", "poke", "voice", "buffer", "reverse-websocket"]
passive = true
version = "0.7.0"
id = "qq_auto_reply"
type = "plugin"
entry = "plugin.plugins.qq_auto_reply:QQAutoReplyPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

[plugin.store]
enabled = false

[plugin.ui]
enabled = true

[[plugin.ui.panel]]
id = "main"
title = "QQ 集成"
entry = "static/index.html"
context = "qq_auto_reply"
permissions = ["state:read", "action:call"]

[plugin_runtime]
enabled = true
auto_start = false