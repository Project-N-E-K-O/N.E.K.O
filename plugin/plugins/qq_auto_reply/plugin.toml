[plugin]
name = "QQ集成"
description = "通过 OneBot 反向 WebSocket（NapCat/LLOneBot）或 QQ 官方机器人 API 接入 QQ，支持多群注意力竞争、疲劳系统、动态回复缓冲、多模态输出、提示词编辑、戳一戳、表情包等功能。"
short_description = "完整 QQ 机器人集成：NapCat/开放平台双通道、注意力管理、多模态交互"
keywords = ["qq", "onebot", "napcat", "qq-open-platform", "auto-reply", "chat", "attention", "fatigue", "sticker", "poke", "voice", "buffer", "reverse-websocket"]
passive = true
version = "0.7.0"
id = "qq_auto_reply"
type = "plugin"
entry = "plugin.plugins.qq_auto_reply:QQAutoReplyPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

[plugin.store]
enabled = false

[plugin.ui]
enabled = true

[[plugin.ui.panel]]
id = "main"
title = "Hello QQ"
entry = "static/index.html"
context = "qq_auto_reply"
permissions = ["state:read", "action:call"]

[plugin_runtime]
enabled = true
auto_start = false