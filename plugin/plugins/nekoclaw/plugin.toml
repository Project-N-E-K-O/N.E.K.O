[plugin]
id = "nekoclaw"
name = "NekoClaw"
description = "同步委托 NekoClaw 执行用户的具体任务，并在收到 NekoClaw 的最终 reply 后再返回给 NEKO 转述给用户。只要用户有明确的任务意图（如搜索、操作、分析等），即应通过此插件调用。调用后不得立刻告诉用户“已完成”或“已交给 NekoClaw 处理”，而应等待插件返回实际结果。支持文本、图片、多模态消息。"
version = "1.0.0"
entry = "plugins.nekoclaw:NekoclawPlugin"

[plugin.sdk]
recommended = ">=0.1.0,<0.3.0"
supported = ">=0.1.0,<0.3.0"
