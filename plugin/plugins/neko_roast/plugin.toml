[plugin]
id = "neko_roast"
name = "猫娘锐评"
description = "直播时对新观众的 B站昵称和头像进行猫娘人设锐评。"
short_description = "首次弹幕触发头像与昵称锐评。"
keywords = ["bilibili", "danmaku", "avatar", "roast", "直播", "锐评", "头像", "观众"]
passive = true
version = "0.1.0"
entry = "plugin.plugins.neko_roast:NekoRoastPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

[plugin.ui]
enabled = true

[[plugin.ui.panel]]
id = "main"
title = "猫娘锐评"
entry = "ui/panel.tsx"
context = "dashboard"
permissions = ["state:read", "config:read", "action:call"]

[[plugin.ui.guide]]
id = "quickstart"
title = "快速开始"
entry = "docs/quickstart.md"
mode = "markdown"
permissions = ["state:read"]

[[plugin.ui.guide]]
id = "development"
title = "开发文档"
entry = "docs/development.md"
mode = "markdown"
permissions = ["state:read"]

[plugin_runtime]
enabled = true
auto_start = false

[plugin.store]
enabled = true

[neko_roast]
live_room_id = 0
live_mode = "co_stream"
live_enabled = false
developer_tools_enabled = false
dry_run = true
roast_once_per_uid = true
roast_strength = "normal"
co_stream_output_policy = "auto_low_interrupt"
solo_output_policy = "auto_rate_limited"
avatar_fetch_timeout_seconds = 8
recent_limit = 30
rate_limit_seconds = 20
queue_limit = 5
safety_auto_stop_enabled = true
safety_window_seconds = 60
safety_pipeline_failure_limit = 3
safety_output_failure_limit = 2
safety_queue_overflow_limit = 3
viewer_store_dir = ""
